<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AI-based Translator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="tab-nav elevation-2" role="tablist" aria-label="功能导航">
    <button class="tab-nav__btn is-active" id="translate-tab" data-tab="translate" role="tab" aria-selected="true" aria-controls="translate">首页</button>
    <button class="tab-nav__btn" id="chat-tab" data-tab="chat" role="tab" aria-selected="false" aria-controls="chat">聊一聊</button>
    <button class="tab-nav__btn" id="history-tab" data-tab="history" role="tab" aria-selected="false" aria-controls="history">历史记录</button>
    <button class="tab-nav__btn" id="settings-tab" data-tab="settings" role="tab" aria-selected="false" aria-controls="settings">设置</button>
  </nav>
  <main class="tab-container">
    <section id="translate" class="tab-panel" role="tabpanel" aria-labelledby="translate-tab">
      <h2 class="text-title">AI 翻译助手</h2>
      <div class="io-container">
          <label for="input" class="sr-only">输入内容</label>
          <textarea id="input" class="translation-input" placeholder="请输入内容，选择目标语言，然后点击翻译、润色或词典..." rows="4"></textarea>
          <div class="control-row">
            <button id="translateBtn" class="action-btn">翻译</button>
            <select id="lang" class="lang-select" aria-label="选择目标语言">
              <option value="en">英文</option>
              <option value="zh">中文</option>
              <option value="ja">日语</option>
              <option value="ko">韩语</option>
            </select>
            <button id="polishBtn" class="action-btn">润色</button>
            <button id="wordBtn" class="action-btn">词典</button>
            <button id="clearOrStopBtn" class="action-btn clear-btn">清空</button>
          </div>
          <label for="output" class="sr-only">输出结果</label>
          <textarea id="output" class="translation-output" placeholder="结果将显示在这里..." readonly rows="8"></textarea>
          <div class="control-row" style="margin-top:6px; width:100%">
            <button id="copyThinkBtn" class="action-btn">复制结果</button>
          </div>
      </div>
      <div class="loading-indicator" style="display: none;">
        <span class="loading-text">请稍等，正在处理...</span>
      </div>
    </section>
    <section id="chat" class="tab-panel" hidden role="tabpanel" aria-labelledby="chat-tab">
      <div class="chat-header">
        <h2 class="text-title">AI 对话聊天</h2>
        <button id="newChatBtn" class="action-btn new-chat-btn">开启新对话</button>
      </div>
      <div class="chat-container elevation-2">
        <div class="message-container" id="messageContainer" aria-live="polite"></div>
        <div class="chat-input-area">
          <label for="chatInput" class="sr-only">聊天输入</label>
          <textarea id="chatInput" placeholder="输入消息，Enter 发送，Shift+Enter 换行" rows="2"></textarea>
          <button id="sendBtn" class="action-btn">发送</button>
        </div>
      </div>
    </section>
    <section id="settings" class="tab-panel" hidden role="tabpanel" aria-labelledby="settings-tab">
      <div class="config-card elevation-2">
        <div class="config-header">
          <h3 class="text-title">模型设置</h3>
          <p class="text-body">请前往 <a href="https://build.nvidia.com/models" target="_blank" rel="noopener noreferrer">NVIDIA 模型平台</a> 或其他 OpenAI 兼容平台获取 API 密钥。</p>
        </div>
        <div class="input-group">
          <label for="apiKey" class="input-label">API 密钥：</label>
          <input type="password" id="apiKey" class="config-input" placeholder="请输入 API 密钥">
        </div>
        <div class="input-group">
          <label for="apiEndpoint" class="input-label">API 端点：</label>
          <input type="text" id="apiEndpoint" class="config-input" placeholder="例如：https://integrate.api.nvidia.com/v1">
        </div>
        <div class="input-group">
          <label for="model" class="input-label">模型名称：</label>
          <input type="text" id="model" class="config-input" list="modelPresets" placeholder="从下拉列表选择或输入自定义模型名称">
          <datalist id="modelPresets">
            <option value="openai/gpt-oss-20b">
            <option value="deepseek-ai/deepseek-v4-flash">
            <option value="meta/llama-3.3-70b-instruct">
            <option value="google/gemma-4-31b-it">
          </datalist>
        </div>
        <div class="input-group checkbox-group">
          <span class="input-label">流式传输：</span>
          <div class="checkbox-container">
            <div class="checkbox-item">
              <input type="checkbox" id="streamTranslate" class="config-checkbox">
              <label for="streamTranslate" class="checkbox-label">翻译逐字显示</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="streamChat" class="config-checkbox">
              <label for="streamChat" class="checkbox-label">聊天逐字显示</label>
            </div>
          </div>
        </div>
        <div style="margin-top: 20px;">
          <button id="saveApiKeyBtn" class="action-btn full-width" style="padding: 12px;">
            保存设置
          </button>
        </div>
      </div>
    </section>
    <section id="history" class="tab-panel" hidden role="tabpanel" aria-labelledby="history-tab">
      <div class="config-card elevation-2">
        <div class="config-header">
          <h3 class="text-title">最近 10 条记录</h3>
        </div>
        <div class="history-container">
          <ul id="historyList" class="history-list" style="margin-top:16px;"></ul>
          <button id="clearHistoryBtn" class="action-btn full-width" style="margin-top: 14px;">
            清除历史记录
          </button>
        </div>
      </div>
    </section>
  </main>
  <script src="popup.js" type="module"></script>
</body>
</html>
